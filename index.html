<!DOCTYPE html>

<html>

<head>
<title>Attendance Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>

<body>

<div class="dashboard">

<!-- Header with Toggle Button -->

<div class="header">

<h1>Student Attendance Dashboard</h1>

<div class="theme-toggle">

<span id="modeLabel">Light Mode</span>

<label class="switch">
<input type="checkbox" id="themeSwitch" onclick="toggleTheme()">
<span class="slider"></span>
</label>

</div>

</div>

<div class="cards">

<div class="card">
<p>Attendance %</p>
<h2 id="attendancePercent">--</h2>
</div>

<div class="card">
<p>Classes Attended</p>
<h2 id="attendedCount">--</h2>
</div>

<div class="card">
<p>Classes Missed</p>
<h2 id="missedCount">--</h2>
</div>

<div class="card">
<p>Classes Needed</p>
<h2 id="neededClasses">--</h2>
</div>

<div class="card">
<p>Bunkable Classes</p>
<h2 id="bunkableClasses">--</h2>
</div>

</div>

<div class="progress-container">
<p>Attendance Progress</p>

<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>

</div>

<div class="input-box">

<label>Classes Attended</label> <input type="number" id="present" placeholder="Enter attended classes" min="1">

<label>Classes Missed</label> <input type="number" id="absent" placeholder="Enter missed classes" min="0">

<button onclick="calculateAttendance()">Calculate Attendance</button>

</div>

<div id="statusMessage"></div>

</div>

<script src="attendance.js"></script>

<script>
function toggleTheme(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
