<!DOCTYPE html>
<html>

<head>
<title>Attendance Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<div class="header">

<h1>Student Attendance Dashboard</h1>

<div class="theme-toggle">
<span id="modeLabel">Dark Mode</span>

<label class="switch">
<input type="checkbox" onclick="toggleTheme()">
<span class="slider"></span>
</label>

</div>
</div>

<div class="input-box">

<label>Subjects</label>
<select id="subjectDropdown" onchange="selectSubject()">
<option value="">Select Subject</option>
</select>

<label>Subject Name</label>
<input type="text" id="subjectName" placeholder="Enter subject name">

<label>Classes Attended</label>
<input type="number" id="present" min="1">

<label>Classes Missed</label>
<input type="number" id="absent" min="0">

<button onclick="calculateAttendance()">Add / Update Subject</button>

</div>

<div class="cards">

<div class="card">
<p>Attendance %</p>
<h2 id="attendancePercent">--</h2>
</div>

<div class="card">
<p>Classes Attended</p>
<h2 id="attendedCount">--</h2>
</div>

<div class="card">
<p>Classes Missed</p>
<h2 id="missedCount">--</h2>
</div>

<div class="card" id="neededCard">
<p>Classes Needed</p>
<h2 id="neededClasses">--</h2>
</div>

<div class="card" id="bunkCard">
<p>Bunkable Classes</p>
<h2 id="bunkableClasses">--</h2>
</div>

</div>

<div class="progress-container">

<p>Attendance Progress</p>

<div class="progress-bar">
<div id="progressFill" class="progress-fill"></div>
</div>

</div>

<div class="chart-container">

<h3>All Subjects Attendance</h3>

<canvas id="attendanceChart"></canvas>

</div>

<div id="statusMessage"></div>

</div>

<script src="attendance.js"></script>

</body>
</html>
